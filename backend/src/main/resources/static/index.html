<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮 - 唤取</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>
<body class="gacha-page">
    <!-- 顶部栏 -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="top-bar-title">唤取</span>
        </div>
        <div class="astralite-container">
            <div class="astralite-icon"></div>
            <span class="astralite-amount" id="astraliteCount">1600</span>
            <div class="astralite-add">+</div>
        </div>
        <div class="top-bar-right">
            <button class="top-icon-btn" title="背包">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                </svg>
            </button>
            <button class="top-icon-btn close-app-btn" title="关闭" id="logoutBtn">
                <img src="/assets/tuichu2.png" width="20" height="20" alt="退出">
            </button>
        </div>
    </header>

    <!-- 雪花粒子背景 -->
    <div class="snow-particles" id="snowParticles"></div>

    <!-- 左侧卡池列表 -->
    <aside class="banner-sidebar" id="bannerSidebar">
        <!-- 动态加载卡池列表 -->
        <div id="bannerSlots"></div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-area" id="mainArea">
        <!-- 卡池背景图（全屏铺满） -->
        <div class="banner-bg" id="bannerBg"></div>
        <!-- 左侧渐变遮罩 -->
        <div class="banner-gradient"></div>

        <!-- 卡池详情 -->
        <div class="banner-detail" id="bannerDetail">
            <div class="banner-info">
                <p class="banner-subtitle" id="bannerSubtitle">角色活动唤取</p>
                <h1 class="banner-title" id="bannerTitle">雪色所映千般未来</h1>
                <div class="banner-timer">
                    <span class="timer-icon">⏱</span>
                    <span>剩余时间：<span id="bannerTimer">--</span></span>
                </div>
                <div class="banner-rules">
                    <p>每<span class="highlight">10</span>次唤取必得<span class="highlight">4</span>星或以上内容</p>
                    <p>至多<span class="highlight" id="maxPityDisplay">80</span>次唤取必得<span class="highlight">5</span>星角色</p>
                </div>
            </div>

            <!-- UP角色信息 -->
            <div class="up-character-info" id="upCharacter">
                <div class="up-character-element" id="upElement">
                    <div class="element-icon">❄</div>
                </div>
                <div class="up-character-details">
                    <span class="up-label">UP!</span>
                    <h2 class="up-character-name" id="upCharacterName">绯雪</h2>
                    <div class="up-character-stars" id="upStars">★★★★★</div>
                </div>
            </div>
        </div>

        <!-- 4星概率提升角色 -->
        <div class="rate-up-section" id="rateUpSection">
            <p class="rate-up-title">以下4星角色出现概率提升</p>
            <div class="rate-up-list" id="rateUpList">
                <div class="rate-up-item">
                    <div class="rate-up-avatar" style="background-image: url('/images/avators/touxiang-baizhi.png'); background-size: cover; background-position: center top;"></div>
                </div>
                <div class="rate-up-item">
                    <div class="rate-up-avatar" style="background-image: url('/images/avators/touxiang-qiushui.png'); background-size: cover; background-position: center top;"></div>
                </div>
                <div class="rate-up-item">
                    <div class="rate-up-avatar" style="background-image: url('/images/avators/touxiang-yuanwu.png'); background-size: cover; background-position: center top;"></div>
                </div>
            </div>
        </div>

        <!-- 底部按钮栏 -->
        <div class="bottom-bar">
            <div class="bottom-left-btns">
                <button class="bottom-icon-btn" id="historyBtn" title="记录">
                    <img src="/assets/lishijilu3.png" width="22" height="22" alt="记录">
                </button>
            </div>
            <div class="bottom-right-btns">
                <!-- 保底计数显示 -->
                <div class="pity-display" id="pityDisplay">
                    <div class="pity-ring">
                        <svg viewBox="0 0 36 36" class="pity-ring-svg">
                            <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(74,158,255,0.15)" stroke-width="2"/>
                            <circle cx="18" cy="18" r="16" fill="none" stroke="var(--accent-blue)" stroke-width="2"
                                    stroke-dasharray="100.53" stroke-dashoffset="100.53" stroke-linecap="round"
                                    id="pityRingProgress" transform="rotate(-90 18 18)"/>
                        </svg>
                        <span class="pity-number" id="pityNumber">0</span>
                    </div>
                    <span class="pity-label">保底</span>
                </div>
                <button class="pull-btn" id="singlePullBtn">
                    <div class="pull-btn-icon"></div>
                    <span class="pull-btn-text">× 160</span>
                    <span class="pull-btn-label">唤取1次</span>
                </button>
                <button class="pull-btn" id="tenPullBtn">
                    <div class="pull-btn-icon"></div>
                    <span class="pull-btn-text">× 1600</span>
                    <span class="pull-btn-label">唤取10次</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 抽卡结果展示 -->
    <div id="resultView" class="result-view hidden">
        <div class="result-overlay"></div>
        <div class="result-container">
            <div class="result-header">
                <h3>唤取结果</h3>
                <button class="close-btn" id="closeResultBtn">×</button>
            </div>
            <div class="result-cards" id="resultCards"></div>
            <button class="confirm-btn" id="confirmResultBtn">确认</button>
        </div>
    </div>

    <!-- 抽卡记录页面 -->
    <div id="historyView" class="history-view hidden">
        <div class="history-header">
            <h2>抽卡记录</h2>
            <div class="history-filters">
                <select id="historyPoolFilter">
                    <option value="limited-character">限定角色池</option>
                    <option value="limited-weapon">限定武器池</option>
                    <option value="standard-character">常驻角色</option>
                    <option value="standard-weapon">常驻武器</option>
                </select>
                <button class="close-history-btn" id="closeHistoryBtn" title="关闭">✕</button>
            </div>
        </div>
        <div class="history-stats" id="historyStats"></div>
        <div class="history-table-container">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>池子</th>
                        <th>名称</th>
                        <th>稀有度</th>
                        <th>类型</th>
                        <th>保底计数</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
        <div class="history-pagination" id="historyPagination"></div>
    </div>

    <!-- 抽卡动画遮罩 -->
    <div id="pullAnimation" class="pull-animation hidden">
        <div class="animation-content">
            <div class="light-effect"></div>
            <div class="star-effect"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/gacha.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
