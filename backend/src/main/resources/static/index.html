<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮 - 抽卡系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>
<body class="gacha-page">
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">鸣潮</div>
        <nav class="nav">
            <button class="nav-btn active" data-pool="character">角色活动唤取</button>
            <button class="nav-btn" data-pool="weapon">武器活动唤取</button>
            <button class="nav-btn" data-pool="limited">限定角色唤取</button>
            <button class="nav-btn" data-page="history">抽卡记录</button>
        </nav>
        <div class="user-info">
            <span class="currency starlight">
                <span class="icon">✦</span>
                <span id="starlightCount">0</span>
            </span>
            <span class="currency starshards">
                <span class="icon">◆</span>
                <span id="starshardsCount">0</span>
            </span>
            <span class="username" id="usernameDisplay"></span>
            <button class="logout-btn" id="logoutBtn">退出</button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 抽卡界面 -->
        <div id="gachaView" class="gacha-view">
            <!-- 背景效果 -->
            <div class="gacha-bg">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>

            <!-- 池子信息 -->
            <div class="pool-info">
                <h2 id="poolTitle">角色活动唤取</h2>
                <p id="poolDescription" class="pool-desc">限定五星角色概率提升</p>
                <div class="pity-info">
                    <span>距离保底：<span id="pityCount">0</span>/<span id="maxPity">90</span></span>
                </div>
            </div>

            <!-- 抽卡按钮区域 -->
            <div class="pull-buttons">
                <button class="pull-btn single-pull" id="singlePullBtn">
                    <span class="btn-text">唤取1次</span>
                    <span class="btn-cost">
                        <span class="icon">✦</span> 160
                    </span>
                </button>
                <button class="pull-btn ten-pull" id="tenPullBtn">
                    <span class="btn-text">唤取10次</span>
                    <span class="btn-cost">
                        <span class="icon">✦</span> 1500
                    </span>
                </button>
            </div>

            <!-- 概率信息 -->
            <div class="rate-info">
                <div class="rate-item">
                    <span class="star five-star">★★★★★</span>
                    <span class="rate-value">0.800%</span>
                </div>
                <div class="rate-item">
                    <span class="star four-star">★★★★</span>
                    <span class="rate-value">6.000%</span>
                </div>
                <div class="rate-item">
                    <span class="star three-star">★★★</span>
                    <span class="rate-value">93.200%</span>
                </div>
            </div>
        </div>

        <!-- 抽卡结果展示 -->
        <div id="resultView" class="result-view hidden">
            <div class="result-overlay"></div>
            <div class="result-container">
                <div class="result-header">
                    <h3>唤取结果</h3>
                    <button class="close-btn" id="closeResultBtn">×</button>
                </div>
                <div class="result-cards" id="resultCards">
                    <!-- 动态生成结果卡片 -->
                </div>
                <button class="confirm-btn" id="confirmResultBtn">确认</button>
            </div>
        </div>

        <!-- 抽卡记录页面 -->
        <div id="historyView" class="history-view hidden">
            <div class="history-header">
                <h2>抽卡记录</h2>
                <div class="history-filters">
                    <select id="historyPoolFilter">
                        <option value="character">角色池</option>
                        <option value="weapon">武器池</option>
                        <option value="limited">限定池</option>
                    </select>
                </div>
            </div>

            <div class="history-stats" id="historyStats">
                <!-- 动态生成统计数据 -->
            </div>

            <div class="history-table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>池子</th>
                            <th>名称</th>
                            <th>稀有度</th>
                            <th>类型</th>
                            <th>保底计数</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- 动态生成记录 -->
                    </tbody>
                </table>
            </div>

            <div class="history-pagination" id="historyPagination">
                <!-- 动态生成分页 -->
            </div>
        </div>
    </main>

    <!-- 抽卡动画遮罩 -->
    <div id="pullAnimation" class="pull-animation hidden">
        <div class="animation-content">
            <div class="light-effect"></div>
            <div class="star-effect"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/gacha.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
